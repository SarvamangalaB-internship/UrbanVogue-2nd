jwt:
  secret: urbanvogue-super-secret-key-for-tokengeneration-2026-very-secure-key

server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      default-filters:
        - AuthenticationFilter
      routes:
        - id: auth-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/auth/**

        - id: product-service
          uri: http://localhost:8091
          predicates:
            - Path=/api/products/**

        - id: order-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/orders/**

        - id: payment-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/payments/**

        - id: notification-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/notifications/**

        - id: admin-service
          uri: http://localhost:8086
          predicates:
            - Path=/api/admin/**

        - id: user-service
          uri: http://localhost:8087
          predicates:
            - Path=/api/users/**

        - id: cart-service
          uri: http://localhost:8089
          predicates:
            - Path=/api/cart/**
